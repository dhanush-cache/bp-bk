name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff,goreleaser@2

      - name: Run GoReleaser
        run: git cliff --latest --strip header | goreleaser release --clean --release-notes=-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
